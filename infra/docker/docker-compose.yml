services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: spaceos
      POSTGRES_PASSWORD: spaceos
      POSTGRES_DB: spaceos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../apps/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://spaceos:spaceos@db:5432/spaceos
      REDIS_URL: redis://redis:6379/0
      HTML_DIR: /app/html
    ports:
      - "8000:8000"
    volumes:
      - ../../html:/app/html:ro
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../../html:/usr/share/nginx/html:ro
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
