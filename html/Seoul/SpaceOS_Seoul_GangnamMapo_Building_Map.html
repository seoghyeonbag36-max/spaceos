<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceOS · 강남구·마포구 건물 단위 상권 세분화</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0f1024;--panel:#15172e;--card:#1b1e3d;--ink:#e8e9f5;--mut:#9aa0c8;
  --line:#2b2f57;--accent:#6366f1;--accent2:#a78bfa;
  --good:#34d399;--warn:#fb923c;--danger:#f87171;--info:#38bdf8;
  --gangnam:#f59e0b;--mapo:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;font-size:13px}
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}

header{flex:0 0 auto;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.logo{font-size:17px;font-weight:900;letter-spacing:-.5px;color:#fff}
.logo span{color:var(--accent2)}
.sep{width:1px;height:20px;background:var(--line)}
.title{font-size:14px;font-weight:700}
.gu-badges{display:flex;gap:7px}
.gu-badge{font-size:11.5px;padding:4px 10px;border-radius:99px;font-weight:700;border:1px solid}
.gu-badge.gangnam{color:var(--gangnam);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.gu-badge.mapo{color:var(--mapo);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08)}

.ctrl-bar{flex:0 0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 20px;background:var(--card);border-bottom:1px solid var(--line)}
.ctrl-bar label{font-size:11.5px;color:var(--mut);margin-right:3px;flex-shrink:0}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{background:transparent;color:var(--mut);border:0;padding:5px 11px;
  font-size:12px;font-family:inherit;cursor:pointer;transition:.15s}
.seg button.on{background:var(--accent);color:#fff;font-weight:700}
.seg button.on-gangnam{background:var(--gangnam);color:#000;font-weight:700}
.seg button.on-mapo{background:var(--mapo);color:#000;font-weight:700}
.seg button:hover:not(.on):not(.on-gangnam):not(.on-mapo){background:rgba(99,102,241,.15);color:var(--ink)}
.sel{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;
  padding:5px 10px;font-size:12px;font-family:inherit;cursor:pointer}
.ctrl-search{flex:1;min-width:140px;max-width:220px;background:var(--panel);
  border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:5px 10px;font-size:12px;font-family:inherit}
.ctrl-search::placeholder{color:var(--mut)}
.ctrl-search:focus,.sel:focus{outline:none;border-color:var(--accent)}
.ctrl-info{margin-left:auto;font-size:11.5px;color:var(--mut);flex-shrink:0}
.ctrl-info b{color:var(--accent2)}

.main{flex:1;display:flex;overflow:hidden}
.map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

.map-overlay{position:absolute;bottom:14px;left:14px;z-index:500;
  background:rgba(21,23,46,.92);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.map-overlay h4{font-size:11px;font-weight:700;color:var(--mut);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.legend-row{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:4px}
.legend-row:last-child{margin-bottom:0}
.legend-row .swatch{width:13px;height:13px;border-radius:3px;flex-shrink:0}

.gu-legend{position:absolute;bottom:14px;left:220px;z-index:500;
  background:rgba(21,23,46,.92);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
.gu-legend h4{font-size:11px;font-weight:700;color:var(--mut);margin-bottom:7px;letter-spacing:.5px;text-transform:uppercase}
.gu-row{display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:4px}
.gu-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

.side{flex:0 0 340px;display:flex;flex-direction:column;
  background:var(--panel);border-left:1px solid var(--line);overflow-y:auto}
.side-sec{padding:12px 15px;border-bottom:1px solid var(--line)}
.side-sec h3{font-size:11.5px;font-weight:700;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px}

.kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 11px}
.kpi .kl{font-size:10.5px;color:var(--mut);margin-bottom:5px}
.kpi .kv{font-size:20px;font-weight:800;letter-spacing:-.5px}
.kpi .kv small{font-size:11px;font-weight:700;color:var(--mut);margin-left:2px}
.kpi .kb{height:4px;border-radius:3px;background:var(--line);margin-top:7px;overflow:hidden}
.kpi .kb i{display:block;height:100%;border-radius:3px}

/* 구별 비교 */
.gu-compare{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.gc{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.gc .gcl{font-size:10px;font-weight:700;margin-bottom:5px}
.gc .gcv{font-size:14px;font-weight:800}
.gc .gcs{font-size:10px;color:var(--mut);margin-top:2px}

.blist{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.brow{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:9px;
  border:1px solid transparent;cursor:pointer;transition:.15s}
.brow:hover{background:rgba(99,102,241,.08);border-color:var(--line)}
.brow.sel{background:rgba(99,102,241,.15);border-color:var(--accent)}
.brow .bgu{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.brow .bcat{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.brow .binfo{flex:1;min-width:0}
.brow .bnm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .bdong{font-size:10px;color:var(--mut)}
.brow .bvac{font-size:12px;font-weight:800;text-align:right;flex-shrink:0}

.detail{flex:1;padding:14px;display:flex;flex-direction:column;gap:11px}
.det-hint{color:var(--mut);font-size:12.5px;text-align:center;padding:36px 16px;line-height:1.7}
.det-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.det-name{font-size:16px;font-weight:800;line-height:1.3}
.det-sub{font-size:11px;color:var(--mut);margin-top:3px}
.det-score{text-align:right;flex-shrink:0}
.det-score .sv{font-size:26px;font-weight:800;line-height:1}
.det-score .sl{font-size:10px;color:var(--mut);margin-top:2px}
.det-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.dm{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 9px;text-align:center}
.dm .dml{font-size:10px;color:var(--mut);margin-bottom:4px}
.dm .dmv{font-size:15px;font-weight:800}
.det-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10.5px;padding:2px 8px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--mut)}
.det-bar-sec h4{font-size:11px;color:var(--mut);font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.det-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:11.5px}
.det-bar-row .dbl{flex:0 0 70px;color:var(--mut)}
.det-bar-row .dbw{flex:1;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.det-bar-row .dbw i{display:block;height:100%;border-radius:4px;transition:.4s}
.det-bar-row .dbv{flex:0 0 36px;text-align:right;font-weight:700;font-size:11px}
.det-insight{background:var(--card);border:1px solid var(--line);
  border-left:3px solid var(--accent);border-radius:8px;padding:9px 11px;font-size:12px;line-height:1.65;color:#d7d9ef}
.btn-primary{width:100%;border:0;background:var(--accent);color:#fff;
  border-radius:9px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn-primary:hover{background:#818cf8}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo">Space<span>OS</span></div>
      <div class="sep"></div>
      <div class="title">강남구·마포구 건물 단위 상권 세분화 — Digital Twin</div>
    </div>
    <div class="gu-badges">
      <div class="gu-badge gangnam">강남구 30동</div>
      <div class="gu-badge mapo">마포구 30동</div>
      <div id="vworld-badge" style="font-size:11.5px;color:var(--mut);padding:4px 10px">샘플 데이터</div>
    </div>
  </header>

  <!-- 컨트롤 바 1행: 구 + 지표 + 업종 + 검색 -->
  <div class="ctrl-bar">
    <label>구</label>
    <div class="seg" id="seg-gu">
      <button class="on"          onclick="filterGu(this,'all')">전체</button>
      <button                     onclick="filterGu(this,'강남구')">강남구</button>
      <button                     onclick="filterGu(this,'마포구')">마포구</button>
    </div>

    <label>상권</label>
    <div class="seg" id="seg-zone">
      <button class="on" onclick="filterZone(this,'all')">전체</button>
      <!-- 강남구 -->
      <button onclick="filterZone(this,'강남역')" data-gu="강남구">강남역</button>
      <button onclick="filterZone(this,'선릉')"   data-gu="강남구">선릉</button>
      <button onclick="filterZone(this,'COEX')"   data-gu="강남구">COEX</button>
      <button onclick="filterZone(this,'압구정')" data-gu="강남구">압구정</button>
      <button onclick="filterZone(this,'청담')"   data-gu="강남구">청담</button>
      <!-- 마포구 -->
      <button onclick="filterZone(this,'홍대')"   data-gu="마포구">홍대</button>
      <button onclick="filterZone(this,'합정')"   data-gu="마포구">합정</button>
      <button onclick="filterZone(this,'연남')"   data-gu="마포구">연남</button>
      <button onclick="filterZone(this,'상암')"   data-gu="마포구">상암</button>
      <button onclick="filterZone(this,'공덕')"   data-gu="마포구">공덕</button>
    </div>

    <label>지표</label>
    <div class="seg">
      <button class="on" id="metric-vac"  onclick="setMetric(this,'vacancy')">공실률</button>
      <button            id="metric-sent" onclick="setMetric(this,'sentiment')">감성지수</button>
      <button            id="metric-rent" onclick="setMetric(this,'rent')">임대료</button>
    </div>

    <select class="sel" onchange="filterCategory(this.value)">
      <option value="">전체 업종</option>
      <option value="오피스">오피스</option>
      <option value="상업">상업</option>
      <option value="F&B">F&amp;B</option>
      <option value="복합">복합</option>
      <option value="미디어">미디어</option>
      <option value="의료">의료</option>
    </select>

    <input class="ctrl-search" placeholder="건물명 검색..." oninput="filterSearch(this.value)">
    <div class="ctrl-info">건물 <b id="cnt-visible">0</b> / <b id="cnt-total">0</b></div>
  </div>

  <div class="main">
    <!-- 지도 -->
    <div class="map-wrap">
      <div id="map"></div>

      <!-- 공실률 범례 -->
      <div class="map-overlay" id="legend">
        <h4 id="legend-title">공실률</h4>
        <div class="legend-row"><div class="swatch" style="background:#34d399"></div><span>0–5%</span></div>
        <div class="legend-row"><div class="swatch" style="background:#fbbf24"></div><span>5–15%</span></div>
        <div class="legend-row"><div class="swatch" style="background:#f87171"></div><span>15–30%</span></div>
        <div class="legend-row"><div class="swatch" style="background:#7f2d2d"></div><span>30%+</span></div>
      </div>

      <!-- 구 범례 -->
      <div class="gu-legend">
        <h4>자치구</h4>
        <div class="gu-row"><div class="gu-dot" style="background:var(--gangnam)"></div><span style="color:var(--mut)">강남구 (테두리)</span></div>
        <div class="gu-row"><div class="gu-dot" style="background:var(--mapo)"></div><span style="color:var(--mut)">마포구 (테두리)</span></div>
      </div>
    </div>

    <!-- 사이드 패널 -->
    <div class="side">

      <!-- KPI -->
      <div class="side-sec">
        <h3>전체 현황</h3>
        <div class="kpis">
          <div class="kpi">
            <div class="kl">평균 공실률</div>
            <div class="kv" id="kpi-vac">--<small>%</small></div>
            <div class="kb"><i id="kb-vac" style="background:var(--warn)"></i></div>
          </div>
          <div class="kpi">
            <div class="kl">감성지수</div>
            <div class="kv" id="kpi-sent">--<small>pt</small></div>
            <div class="kb"><i id="kb-sent" style="background:var(--accent)"></i></div>
          </div>
          <div class="kpi">
            <div class="kl">분석 건물</div>
            <div class="kv" id="kpi-cnt">--<small>동</small></div>
            <div class="kb"><i id="kb-cnt" style="background:var(--info);width:100%"></i></div>
          </div>
          <div class="kpi">
            <div class="kl">평균 임대료</div>
            <div class="kv" id="kpi-rent">--<small>만/평</small></div>
            <div class="kb"><i id="kb-rent" style="background:var(--accent2)"></i></div>
          </div>
        </div>

        <!-- 구별 비교 -->
        <div class="gu-compare">
          <div class="gc">
            <div class="gcl" style="color:var(--gangnam)">■ 강남구</div>
            <div class="gcv" id="gc-gangnam-vac">--%</div>
            <div class="gcs" id="gc-gangnam-sent">감성 --pt</div>
          </div>
          <div class="gc">
            <div class="gcl" style="color:var(--mapo)">■ 마포구</div>
            <div class="gcv" id="gc-mapo-vac">--%</div>
            <div class="gcs" id="gc-mapo-sent">감성 --pt</div>
          </div>
        </div>
      </div>

      <!-- 건물 목록 -->
      <div class="side-sec" style="flex:0 0 auto">
        <h3>건물 목록</h3>
        <div class="blist" id="blist"></div>
      </div>

      <!-- 상세 -->
      <div class="detail">
        <div class="det-hint" id="det-hint">지도 위 건물 폴리곤 또는<br>목록에서 건물을 선택하세요</div>
        <div id="det-content" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

  { id:'MP030', name:'마포구청 인근 상가',   dong:'성산동', gu:'마포구', zone:'합정',
    addr:'월드컵로 212',  cat:'의료',   floors:4,  year:2001, area:6800,  vac:9.2,  sent:80, rent:9.5,  tenants:38,
    polygon:[[37.5551,126.9100],[37.5551,126.9107],[37.5547,126.9107],[37.5547,126.9100]] }
];

const BUILDINGS = [...GANGNAM, ...MAPO];

/* ── 상태 ── */
let map=null, layerGroup=null;
let currentMetric='vacancy', selectedId=null;
let activeGu='all', activeZone='all', activeCat='', activeSearch='';
let visibleIds=new Set(BUILDINGS.map(b=>b.id));

/* ── 구별 색상 보더 ── */
const GU_BORDER = { '강남구':'#f59e0b', '마포구':'#34d399' };

/* ── 색상 ── */
function colorByVacancy(v){ return v<5?'#34d399':v<15?'#fbbf24':v<30?'#f87171':'#7f2d2d'; }
function colorBySentiment(s){ return s>=85?'#34d399':s>=70?'#60a5fa':s>=55?'#fbbf24':'#f87171'; }
function colorByRent(r){ return r>=20?'#a78bfa':r>=12?'#6366f1':r>=8?'#38bdf8':'#9aa0c8'; }
function getColor(b){
  if(currentMetric==='sentiment') return colorBySentiment(b.sent);
  if(currentMetric==='rent')      return colorByRent(b.rent);
  return colorByVacancy(b.vac);
}
function metricVal(b){
  if(currentMetric==='sentiment') return b.sent+'pt';
  if(currentMetric==='rent')      return b.rent+'만원';
  return b.vac+'%';
}

/* ── 지도 초기화 ── */
function initMap(){
  // 두 구를 모두 담는 중간 좌표
  map = L.map('map',{zoomControl:true}).setView([37.545,126.990],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom:19
  }).addTo(map);
  layerGroup = L.layerGroup().addTo(map);
  renderPolygons(); renderList(); updateKPIs();
}

/* ── 폴리곤 렌더링 ── */
function renderPolygons(){
  if(!map||!layerGroup) return;
  layerGroup.clearLayers();
  BUILDINGS.filter(b=>visibleIds.has(b.id)).forEach(b=>{
    const fillColor = getColor(b);
    const borderColor = GU_BORDER[b.gu] || fillColor;
    const isSel = selectedId===b.id;
    const poly = L.polygon(b.polygon,{
      fillColor,
      fillOpacity: isSel ? 0.80 : 0.55,
      color: isSel ? '#ffffff' : borderColor,
      weight: isSel ? 3 : 1.8,
      opacity: 0.95,
      dashArray: isSel ? null : null
    });
    poly.on('click',()=>selectBuilding(b.id));
    poly.on('mouseover',function(){ if(selectedId!==b.id) this.setStyle({fillOpacity:0.75,color:'#fff',weight:2.5}); });
    poly.on('mouseout', function(){ if(selectedId!==b.id) this.setStyle({fillOpacity:0.55,color:borderColor,weight:1.8}); });
    layerGroup.addLayer(poly);
  });
}

/* ── 목록 ── */
function renderList(){
  const container=document.getElementById('blist');
  const visible=BUILDINGS.filter(b=>visibleIds.has(b.id));
  document.getElementById('cnt-visible').textContent=visible.length;
  document.getElementById('cnt-total').textContent=BUILDINGS.length;
  container.innerHTML=visible.map(b=>`
    <div class="brow ${b.id===selectedId?'sel':''}" onclick="selectBuilding('${b.id}')">
      <div class="bgu" style="background:${GU_BORDER[b.gu]}"></div>
      <div class="bcat" style="background:${getColor(b)}"></div>
      <div class="binfo">
        <div class="bnm">${b.name}</div>
        <div class="bdong">${b.gu} ${b.dong} · ${b.cat}</div>
      </div>
      <div class="bvac" style="color:${getColor(b)}">${metricVal(b)}</div>
    </div>`).join('');
}

/* ── 건물 선택 ── */
function selectBuilding(id){
  selectedId=id;
  const b=BUILDINGS.find(x=>x.id===id);
  if(!b) return;
  if(map){
    const c=b.polygon.reduce((acc,[la,ln])=>[acc[0]+la/b.polygon.length,acc[1]+ln/b.polygon.length],[0,0]);
    map.setView(c,Math.max(map.getZoom(),16));
  }
  renderPolygons(); renderList(); renderDetail(b);
}

/* ── 상세 ── */
function renderDetail(b){
  document.getElementById('det-hint').style.display='none';
  const el=document.getElementById('det-content');
  el.style.cssText='display:flex;flex-direction:column;gap:11px';
  const vc=colorByVacancy(b.vac), sc=colorBySentiment(b.sent);
  const guColor=GU_BORDER[b.gu];
  el.innerHTML=`
    <div class="det-top">
      <div>
        <div style="font-size:10.5px;font-weight:700;color:${guColor};margin-bottom:3px">${b.gu} · ${b.zone} 상권</div>
        <div class="det-name">${b.name}</div>
        <div class="det-sub">${b.dong} · ${b.addr} · ${b.floors}층 · ${b.year}년</div>
      </div>
      <div class="det-score">
        <div class="sv" style="color:${vc}">${b.vac}%</div>
        <div class="sl">공실률</div>
      </div>
    </div>
    <div class="det-tags">
      <span class="tag" style="border-color:${guColor};color:${guColor}">${b.gu}</span>
      <span class="tag">${b.cat}</span>
      <span class="tag">임차인 ${b.tenants}개소</span>
      <span class="tag">${(b.area/1000).toFixed(0)}천㎡</span>
      <span class="tag">${b.rent}만원/평</span>
    </div>
    <div class="det-metrics">
      <div class="dm"><div class="dml">공실률</div><div class="dmv" style="color:${vc}">${b.vac}<small style="font-size:10px">%</small></div></div>
      <div class="dm"><div class="dml">감성지수</div><div class="dmv" style="color:${sc}">${b.sent}<small style="font-size:10px">pt</small></div></div>
      <div class="dm"><div class="dml">임대료</div><div class="dmv" style="color:var(--accent2)">${b.rent}<small style="font-size:10px">만</small></div></div>
    </div>
    <div class="det-bar-sec">
      <h4>세부 지표</h4>
      ${bar('임차인',b.tenants,300,'#38bdf8','개')}
      ${bar('연면적',b.area/1000,100,'#a78bfa','천㎡')}
      ${bar('공실률',b.vac,40,vc,'%')}
      ${bar('감성',b.sent,100,sc,'pt')}
    </div>
    <div class="det-insight">${insight(b)}</div>
    <button class="btn-primary" onclick="alert('PPPP 플랫폼 상세 분석 연동 예정')">PPPP 플랫폼 상세 분석 →</button>`;
}
function bar(l,v,m,c,u){
  const p=Math.min(100,Math.round(v/m*100));
  return `<div class="det-bar-row"><span class="dbl">${l}</span><div class="dbw"><i style="width:${p}%;background:${c}"></i></div><span class="dbv">${typeof v==='number'&&v%1!==0?v.toFixed(1):v}${u}</span></div>`;
}
function insight(b){
  if(b.vac<5)  return `<b>우량 건물</b> — 공실률 ${b.vac}%로 ${b.gu} 최상위. 안정적 임대 수익 확보 가능.`;
  if(b.vac<15) return `<b>주의 필요</b> — 공실률 ${b.vac}%로 평균 수준. 임차인 믹스 최적화 검토 권장.`;
  if(b.vac<30) return `<b>위험 신호</b> — 공실률 ${b.vac}%로 높음. 업종 전환 또는 임대조건 재설계 필요.`;
  return `<b>고위험</b> — 공실률 ${b.vac}%로 심각. SpaceOS AI 업종 추천 모델 적용 필요.`;
}

/* ── KPI ── */
function updateKPIs(){
  const vis=BUILDINGS.filter(b=>visibleIds.has(b.id));
  if(!vis.length) return;
  const avg=(arr,key)=>(arr.reduce((a,b)=>a+b[key],0)/arr.length);
  const aVac =(avg(vis,'vac')).toFixed(1);
  const aSent=Math.round(avg(vis,'sent'));
  const aRent=(avg(vis,'rent')).toFixed(1);
  document.getElementById('kpi-vac').innerHTML  =`${aVac}<small>%</small>`;
  document.getElementById('kpi-sent').innerHTML =`${aSent}<small>pt</small>`;
  document.getElementById('kpi-cnt').innerHTML  =`${vis.length}<small>동</small>`;
  document.getElementById('kpi-rent').innerHTML =`${aRent}<small>만/평</small>`;
  document.getElementById('kb-vac').style.width  =Math.min(100,aVac*2.5)+'%';
  document.getElementById('kb-sent').style.width =aSent+'%';
  document.getElementById('kb-cnt').style.width  =Math.min(100,vis.length/60*100)+'%';
  document.getElementById('kb-rent').style.width =Math.min(100,aRent*3)+'%';

  // 구별 비교
  const gn=vis.filter(b=>b.gu==='강남구');
  const mp=vis.filter(b=>b.gu==='마포구');
  if(gn.length){
    document.getElementById('gc-gangnam-vac').textContent=(avg(gn,'vac')).toFixed(1)+'%';
    document.getElementById('gc-gangnam-sent').textContent=`감성 ${Math.round(avg(gn,'sent'))}pt`;
  }
  if(mp.length){
    document.getElementById('gc-mapo-vac').textContent=(avg(mp,'vac')).toFixed(1)+'%';
    document.getElementById('gc-mapo-sent').textContent=`감성 ${Math.round(avg(mp,'sent'))}pt`;
  }
}

/* ── 필터 ── */
function applyFilters(){
  visibleIds=new Set(BUILDINGS
    .filter(b=>activeGu==='all'||b.gu===activeGu)
    .filter(b=>activeZone==='all'||b.zone===activeZone)
    .filter(b=>!activeCat||b.cat.includes(activeCat))
    .filter(b=>!activeSearch||b.name.includes(activeSearch)||b.dong.includes(activeSearch)||b.gu.includes(activeSearch))
    .map(b=>b.id));
  if(selectedId&&!visibleIds.has(selectedId)){
    selectedId=null;
    document.getElementById('det-hint').style.display='';
    document.getElementById('det-content').style.display='none';
  }
  renderPolygons(); renderList(); updateKPIs();
}

function filterGu(btn,gu){
  document.querySelectorAll('#seg-gu button').forEach(b=>b.className='');
  btn.className = gu==='강남구'?'on-gangnam': gu==='마포구'?'on-mapo':'on';
  activeGu=gu;
  // 구 선택 시 해당 구 중심으로 이동
  if(map){
    const centers={'강남구':[37.5172,127.0473,13],'마포구':[37.5596,126.9230,13],'all':[37.545,126.990,11]};
    const c=centers[gu]||centers.all;
    map.setView([c[0],c[1]],c[2]);
  }
  // 다른 구 상권 버튼 숨기기/보이기
  document.querySelectorAll('#seg-zone button[data-gu]').forEach(b=>{
    b.style.display=(gu==='all'||b.dataset.gu===gu)?'':'none';
  });
  // 상권 필터 초기화
  activeZone='all';
  document.querySelectorAll('#seg-zone button').forEach(b=>b.classList.remove('on'));
  document.querySelector('#seg-zone button:first-child').classList.add('on');
  applyFilters();
}

function filterZone(btn,zone){
  document.querySelectorAll('#seg-zone button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeZone=zone;
  if(map&&zone!=='all'){
    const centers={
      '강남역':[37.499,127.028],'선릉':[37.504,127.044],'COEX':[37.511,127.059],
      '압구정':[37.526,127.040],'청담':[37.522,127.047],'신사':[37.521,127.023],
      '홍대':[37.558,126.924],'합정':[37.553,126.909],
      '연남':[37.562,126.922],'상암':[37.579,126.889],'공덕':[37.544,126.951]
    };
    if(centers[zone]) map.setView(centers[zone],15);
  }
  applyFilters();
}

function setMetric(btn,metric){
  document.querySelectorAll('#metric-vac,#metric-sent,#metric-rent').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentMetric=metric;
  const L={
    vacancy:  {title:'공실률',rows:[['#34d399','0–5%'],['#fbbf24','5–15%'],['#f87171','15–30%'],['#7f2d2d','30%+']]},
    sentiment:{title:'감성지수',rows:[['#34d399','85+'],['#60a5fa','70–85'],['#fbbf24','55–70'],['#f87171','55-']]},
    rent:     {title:'임대료 (만원/평)',rows:[['#a78bfa','20+'],['#6366f1','12–20'],['#38bdf8','8–12'],['#9aa0c8','8-']]}
  };
  const lg=L[metric];
  document.getElementById('legend-title').textContent=lg.title;
  document.getElementById('legend').querySelectorAll('.legend-row').forEach((r,i)=>{
    r.querySelector('.swatch').style.background=lg.rows[i][0];
    r.querySelector('span').textContent=lg.rows[i][1];
  });
  renderPolygons(); renderList();
}

function filterCategory(cat){ activeCat=cat; applyFilters(); }
function filterSearch(val){ activeSearch=val.trim(); applyFilters(); }

window.addEventListener('load',initMap);
</script>
</body>
</html>
