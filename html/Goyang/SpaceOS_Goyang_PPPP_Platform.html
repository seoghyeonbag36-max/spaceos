<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SpaceOS · 고양시 PPPP 상권 플랫폼</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0e1117;--panel:#161b22;--panel2:#1c232d;--line:#2a323d;--txt:#e6edf3;--sub:#9aa7b4;--accent:#4dd0a7;--blue:#5aa9ff;--warn:#e85d5d;--gold:#e8c15d;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
#app{display:grid;grid-template-columns:268px 1fr 360px;grid-template-rows:56px 1fr;height:100vh}
header{grid-column:1/4;display:flex;align-items:center;gap:14px;padding:0 18px;background:linear-gradient(90deg,#11161d,#161b22);border-bottom:1px solid var(--line)}
header .logo{font-weight:800;font-size:17px;letter-spacing:.5px}
header .logo b{color:var(--accent)}
header .sub{font-size:11.5px;color:var(--sub)}
header .spacer{flex:1}
header .meta{font-size:11px;color:var(--sub);text-align:right;line-height:1.5}
.sidebar{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:14px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.tab{padding:9px 6px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.tab .en{display:block;font-size:9px;font-weight:600;opacity:.7;margin-top:2px}
.tab.on{background:var(--accent);color:#06231a;border-color:var(--accent)}
.sec-t{font-size:10.5px;color:var(--sub);letter-spacing:1px;margin:6px 0 8px;font-weight:700}
.dlist{display:flex;flex-direction:column;gap:6px}
.ditem{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);cursor:pointer;transition:.15s}
.ditem:hover{border-color:var(--accent)}
.ditem.on{border-color:var(--accent);background:#15271f}
.ditem .rk{width:20px;height:20px;border-radius:50%;background:#2a323d;color:var(--txt);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ditem.on .rk{background:var(--accent);color:#06231a}
.ditem .nm{font-size:13px;font-weight:700}
.ditem .gu{font-size:10px;color:var(--sub)}
.dot{width:9px;height:9px;border-radius:50%;margin-left:auto;flex-shrink:0}
#map{height:100%;width:100%}
.mapwrap{position:relative}
.maplegend{position:absolute;left:12px;bottom:18px;z-index:500;background:rgba(20,26,33,.92);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:11px;color:var(--sub)}
.maplegend .row{display:flex;align-items:center;gap:6px;margin-top:4px}
.maplegend .sw{width:26px;height:9px;border-radius:3px}
.panel{background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:16px}
.p-head{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.p-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;background:var(--accent);color:#06231a}
.p-title{font-size:18px;font-weight:800}
.p-gu{font-size:11.5px;color:var(--sub);margin-bottom:12px}
.p-char{font-size:12px;line-height:1.6;color:#c9d3dd;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;margin-bottom:14px}
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px}
.kpi .v{font-size:18px;font-weight:800}
.kpi .l{font-size:10px;color:var(--sub);margin-top:2px}
.block{margin-bottom:16px}
.block h4{font-size:12px;color:var(--sub);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.block h4:before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11.5px}
.bar .lab{width:42px;color:var(--sub)}
.bar .track{flex:1;height:8px;background:#222b35;border-radius:5px;overflow:hidden}
.bar .fill{height:100%;border-radius:5px}
.bar .num{width:34px;text-align:right;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:10.5px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);color:#c9d3dd}
.chip.pos{border-color:#2e6f5a;color:#7fe3c0}
.chip.neg{border-color:#7a3636;color:#f0a0a0}
.tier{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;background:var(--panel2)}
.tier .tt{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tier .tg{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
.tg.premium{background:#3a2e5e;color:#c8b4ff}
.tg.value{background:#2e4a5e;color:#a8d8ff}
.tg.factory{background:#5e4a2e;color:#ffd9a8}
.tier .biz{font-size:14px;font-weight:800}
.tier .cc{font-size:11px;color:var(--sub);margin-bottom:8px}
.tier .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.tier .mt{background:#11161d;border-radius:7px;padding:7px;text-align:center}
.tier .mt .mv{font-size:13px;font-weight:800;color:var(--accent)}
.tier .mt .ml{font-size:9px;color:var(--sub);margin-top:2px}
.tier .fit{font-size:11px;line-height:1.55;color:#c9d3dd}
.prog{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;background:var(--panel2)}
.prog .pt{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;margin-bottom:5px}
.prog .pd{font-size:11px;line-height:1.55;color:var(--sub)}
.ha{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;margin-left:auto;flex-shrink:0}
.ha.균형{background:#2e4a5e;color:#a8d8ff}.ha.공생{background:#2e5e44;color:#a8ffcb}.ha.공감{background:#5e2e4a;color:#ffa8d8}
.subhead{font-size:11px;font-weight:800;color:var(--blue);margin:4px 0 9px;display:flex;align-items:center;gap:6px}
.subhead.off{color:var(--gold)}
.gridstat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.note{font-size:11px;color:var(--sub);line-height:1.5;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:12px}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#2a323d;border-radius:4px}
</style></head>

</div>

var layer='platform', curId='lafesta';
var map=L.map('map',{zoomControl:true,attributionControl:false}).setView([37.652,126.81],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
var pinLayer=L.layerGroup().addTo(map), gridLayer=L.layerGroup().addTo(map);

function d(id){return DISTRICTS.find(function(x){return x.id===id});}
function sentColor(s){var t=Math.max(0,Math.min(1,(s-45)/40));var r,g,b;
  if(t<.5){var k=t/.5;r=232+(232-232)*k;g=93+(193-93)*k;b=93+(93-93)*k;}
  else{var k=(t-.5)/.5;r=232+(77-232)*k;g=193+(208-193)*k;b=93+(167-93)*k;}
  return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';}
function vacColor(v){var t=Math.max(0,Math.min(1,v/25));var r,g,b;
  if(t<.5){var k=t/.5;r=77+(232-77)*k;g=208+(193-208)*k;b=167+(93-167)*k;}
  else{var k=(t-.5)/.5;r=232+(200-232)*k;g=193+(40-193)*k;b=93+(40-93)*k;}
  return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';}
function mul(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function renderPins(){pinLayer.clearLayers();
  DISTRICTS.forEach(function(x){
    var col=layer==='page'?vacColor(x.page.avg):sentColor(x.sentiment);
    var rad=8+x.importance/12;
    var m=L.circleMarker([x.lat,x.lng],{radius:rad,fillColor:col,color:x.id===curId?'#fff':'rgba(255,255,255,.5)',weight:x.id===curId?3:1.3,fillOpacity:.82});
    m.on('click',function(){select(x.id);});
    m.bindTooltip(x.rank+'. '+x.name,{direction:'top',offset:[0,-rad]});
    m.addTo(pinLayer);
  });}

function renderGrid(){gridLayer.clearLayers();
  if(layer!=='page'){return;}
  var x=d(curId),p=x.page;
  var dLat=0.0009, dLng=0.001134;
  var r0=x.lat+(p.rows/2)*dLat, c0=x.lng-(p.cols/2)*dLng;
  var rnd=mul(x.rank*9301+49297);
  for(var i=0;i<p.rows;i++)for(var j=0;j<p.cols;j++){
    var v=p.avg+(rnd()*2-1)*p.avg*0.55;
    p.hotspots.forEach(function(h){var dist=Math.abs(h[0]-i)+Math.abs(h[1]-j);if(dist<=1)v+=(2-dist)*9;});
    v=Math.max(0,v);
    var lat1=r0-i*dLat, lat2=lat1-dLat, lng1=c0+j*dLng, lng2=lng1+dLng;
    var rect=L.rectangle([[lat2,lng1],[lat1,lng2]],{color:'#0e1117',weight:.6,fillColor:vacColor(v),fillOpacity:.62});
    rect.bindTooltip('공실률 '+v.toFixed(1)+'%'+(v>=20?' ⚠ 위험':''),{sticky:true});
    rect.addTo(gridLayer);
  }
  map.setView([x.lat,x.lng],16);
}

    h+='<div class="gridstat"><div class="kpi"><div class="v">'+p.avg+'%</div><div class="l">평균 공실률</div></div>'
      +'<div class="kpi"><div class="v">'+p.rows+'×'+p.cols+'</div><div class="l">100m 그리드 ('+total+'셀)</div></div></div>';
    h+='<div class="note"><b>핫스팟:</b> '+p.note+'<br/>각 셀 = 100m×100m. 공실률 ≥20% 셀은 위험(적색)으로 표시되며, 마우스를 올리면 셀별 수치를 확인할 수 있습니다. 지도는 네이버 지도 좌표에 정합됩니다.</div>';
    h+='<div class="block"><h4>공실 분포 해석</h4><div class="prog"><div class="pd">평균 '+p.avg+'%를 기준으로 핫스팟 인접 셀에 공실이 집중됩니다. SpaceOS는 이 그리드를 Posting(입점 추천) 우선순위 산정의 입력값으로 사용합니다 — 위험 셀일수록 입점 인센티브·임대 협상 여지가 큽니다.</div></div></div>';
  } else if(layer==='posting'){
    var ps=x.posting; var tiers=[['premium','고급화',ps.premium],['value','가성비',ps.value],['factory','공장제',ps.factory]];
    h+='<div class="block"><h4>3-Tier 공실 입점 추천</h4>';
    tiers.forEach(function(t){var o=t[2];
      h+='<div class="tier"><div class="tt"><span class="tg '+t[0]+'">'+t[1]+'</span><span class="biz">'+o.biz+'</span></div>'
        +'<div class="cc">'+o.concept+'</div>'
        +'<div class="grid3"><div class="mt"><div class="mv">'+o.capex+'</div><div class="ml">초기 투자</div></div>'
        +'<div class="mt"><div class="mv">'+o.rev+'</div><div class="ml">예상 매출</div></div>'
        +'<div class="mt"><div class="mv">'+o.payback+'</div><div class="ml">회수 기간</div></div></div>'
        +'<div class="fit">▸ '+o.fit+'</div></div>';
    });
    h+='</div>';
  } else if(layer==='program'){
    var pr=x.program;
    h+='<div class="block"><div class="subhead">◈ 온라인 — LLM 콘텐츠 자동화</div>';
    pr.online.forEach(function(o){h+='<div class="prog"><div class="pt">'+o.t+'<span class="ha '+o.ha+'">'+o.ha+'</span></div><div class="pd">'+o.d+'</div></div>';});
    h+='</div><div class="block"><div class="subhead off">◈ 오프라인 — 행사·팝업 기획</div>';
    pr.offline.forEach(function(o){h+='<div class="prog"><div class="pt">'+o.t+'<span class="ha '+o.ha+'">'+o.ha+'</span></div><div class="pd">'+o.d+'</div></div>';});
    h+='</div><div class="note"><b>Humanistic Authority:</b> 균형(공정한 기회 배분) · 공생(상인·건물주·소비자 상호작용) · 공감(상권 고유 분위기와 일치). 모든 Program은 위 3대 지표를 만족하도록 설계됩니다.</div>';
  }
  document.getElementById('panel').innerHTML=h;
}
function layerLabel(){return {platform:'PLATFORM',page:'PAGE',posting:'POSTING',program:'PROGRAM'}[layer];}

function renderLegend(){var el=document.getElementById('legend');
  if(layer==='page'){el.innerHTML='<b style="color:#e6edf3">공실률 (100m 그리드)</b>'
    +'<div class="row"><span class="sw" style="background:'+vacColor(2)+'"></span>낮음 0–8%</div>'
    +'<div class="row"><span class="sw" style="background:'+vacColor(13)+'"></span>주의 8–20%</div>'
    +'<div class="row"><span class="sw" style="background:'+vacColor(23)+'"></span>위험 ≥20%</div>';}
  else{el.innerHTML='<b style="color:#e6edf3">감성 점수 · 중요도</b>'
    +'<div class="row"><span class="sw" style="background:'+sentColor(50)+'"></span>낮음</div>'
    +'<div class="row"><span class="sw" style="background:'+sentColor(65)+'"></span>중간</div>'
    +'<div class="row"><span class="sw" style="background:'+sentColor(80)+'"></span>높음</div>'
    +'<div class="row" style="margin-top:6px;color:#9aa7b4">원 크기 = 상권 중요도</div>';}
}

function renderList(){var el=document.getElementById('dlist');el.innerHTML='';
  DISTRICTS.forEach(function(x){var col=layer==='page'?vacColor(x.page.avg):sentColor(x.sentiment);
    var div=document.createElement('div');div.className='ditem'+(x.id===curId?' on':'');
    div.innerHTML='<div class="rk">'+x.rank+'</div><div><div class="nm">'+x.name+'</div><div class="gu">'+x.gu+'</div></div><div class="dot" style="background:'+col+'"></div>';
    div.onclick=function(){select(x.id);};el.appendChild(div);
  });}

function select(id){curId=id;renderList();renderPins();renderGrid();renderPanel();
  if(layer!=='page'){var x=d(id);map.setView([x.lat,x.lng],14);}}
function setLayer(l){layer=l;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.layer===l);});
  renderList();renderPins();renderLegend();
  if(l==='page'){renderGrid();}else{gridLayer.clearLayers();var x=d(curId);map.setView([x.lat,x.lng],l==='platform'?12:14);}
  renderPanel();}

document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){setLayer(t.dataset.layer);};});
renderList();renderPins();renderLegend();renderPanel();
map.setView([37.652,126.81],12);
</script>
