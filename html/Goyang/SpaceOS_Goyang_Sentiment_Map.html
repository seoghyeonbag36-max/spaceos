<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceOS · 고양시 상권 감성 지도 (Platform)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<style>
  :root{--bg:#0e1116;--panel:#161b22;--panel2:#1c2430;--line:#2a3340;--txt:#e6edf3;--sub:#9aa7b4;--accent:#4da3ff;--accent2:#7c5cff;--pos:#2ecc71;--mid:#f1c40f;--neg:#e74c3c;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
  #app{display:flex;height:100vh;width:100vw}
  #side{width:380px;min-width:380px;height:100%;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .brand{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent)}
  .brand p{font-size:12px;color:var(--sub);margin-top:6px;line-height:1.5}
  .brand .tag{display:inline-block;margin-top:8px;font-size:10.5px;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:2px 9px;opacity:.85}
  .summary{display:flex;gap:8px;padding:12px 20px 4px}
  .summary .s{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 8px;text-align:center}
  .summary .s .v{font-size:17px;font-weight:800;line-height:1}
  .summary .s .l{font-size:9px;color:var(--sub);margin-top:3px;line-height:1.3}
  .listhead{padding:13px 20px 8px;font-size:11px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
  #list{flex:1;overflow-y:auto;padding:0 12px 16px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin:8px 0;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .card .rank{position:absolute;top:0;right:0;font-size:10px;font-weight:700;color:#0e1116;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:3px 9px;border-bottom-left-radius:10px}
  .card h3{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .card .gu{font-size:11px;color:var(--sub);font-weight:400}
  .card .meta{display:flex;gap:14px;margin-top:9px;align-items:center}
  .score{font-size:22px;font-weight:800;line-height:1}
  .score small{font-size:11px;color:var(--sub);font-weight:500}
  .bar{flex:1;height:7px;border-radius:4px;background:#0e1116;overflow:hidden;margin-top:3px}
  .bar i{display:block;height:100%;border-radius:4px}
  .kw{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .kw span{font-size:10.5px;padding:2px 8px;border-radius:20px;background:#0e1116;color:var(--sub);border:1px solid var(--line)}
  .vac{font-size:10.5px;color:var(--sub);margin-top:7px}
  .vac b{color:var(--neg)}
  #map{flex:1;height:100%;background:#0a0d12;z-index:1}
  .toggle{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:600;background:rgba(22,27,34,.95);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:30px;padding:4px;display:flex;gap:2px}
  .toggle button{background:none;border:none;color:var(--sub);font-family:inherit;font-size:12.5px;font-weight:600;padding:7px 18px;border-radius:26px;cursor:pointer;transition:.15s}
  .toggle button.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .legend{position:absolute;bottom:22px;right:18px;z-index:500;background:rgba(22,27,34,.92);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:11.5px;color:var(--txt);width:214px}
  .legend h4{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .legend .sw{width:13px;height:13px;border-radius:50%}
  .legend .grad{height:9px;border-radius:5px;margin:6px 0 4px}
  .legend .grad.sent{background:linear-gradient(90deg,var(--neg),var(--mid),var(--pos))}
  .legend .grad.vac{background:linear-gradient(90deg,#1a3a6b,#2ecc71,#f1c40f,#e74c3c)}
  .legend .gl{display:flex;justify-content:space-between;font-size:10px;color:var(--sub)}
  .legend .note{margin-top:9px;font-size:10px;color:var(--sub);line-height:1.5;border-top:1px solid var(--line);padding-top:8px}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--txt);border-radius:14px;border:1px solid var(--line);box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:14px 16px;width:268px !important}
  .pop h3{font-size:16px;font-weight:800;margin-bottom:2px}
  .pop .gu{font-size:11px;color:var(--sub)}
  .pop .scwrap{display:flex;align-items:baseline;gap:8px;margin:10px 0 4px}
  .pop .scwrap b{font-size:30px;font-weight:800}
  .pop .scwrap span{font-size:12px;color:var(--sub)}
  .pop .bar{height:8px;margin:6px 0 10px}
  .pop .stats{display:flex;gap:8px;margin:8px 0}
  .pop .stat{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 9px;text-align:center}
  .pop .stat .v{font-size:15px;font-weight:700}
  .pop .stat .l{font-size:9.5px;color:var(--sub);margin-top:2px}
  .pop .kw{margin:8px 0}
  .pop .pn{margin:9px 0 2px}
  .pop .pn .lab{font-size:9.5px;color:var(--sub);margin:6px 0 4px;display:flex;align-items:center;gap:5px}
  .pop .pn .lab.p::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--pos)}
  .pop .pn .lab.n::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--neg)}
  .pop .pn .chips{display:flex;flex-wrap:wrap;gap:4px}
  .pop .pn .chips span{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--line)}
  .pop .pn .chips.p span{background:rgba(46,204,113,.12);color:#7ee2a8;border-color:rgba(46,204,113,.3)}
  .pop .pn .chips.n span{background:rgba(231,76,60,.12);color:#f0a097;border-color:rgba(231,76,60,.3)}
  .pop .desc{font-size:11.5px;color:var(--sub);line-height:1.6;margin-top:8px;border-top:1px solid var(--line);padding-top:9px}
  .pop .src{font-size:9.5px;margin-top:7px;color:#647082}
  #list::-webkit-scrollbar{width:7px}
  #list::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  @media(max-width:760px){#side{width:280px;min-width:280px}.leaflet-popup-content{width:220px !important}}
</style>
</head>

  var c=L.circle([d.lat,d.lng],{radius:radiusM(d.importance),color:areaColor(d),weight:1.2,opacity:.5,fillColor:areaColor(d),fillOpacity:.14});
  c.addTo(areaLayer); c.on('click',function(){selectCard(d.rank);markers[d.rank].openPopup();});
  areas[d.rank]=c;
});
districts.forEach(function(d){
  var col=sentColor(d.sentiment);
  var m=L.circleMarker([d.lat,d.lng],{radius:radiusFor(d.importance),fillColor:col,color:'#ffffff',weight:1.5,opacity:.9,fillOpacity:.78});
  m.addTo(markerLayer);
  var icon=L.divIcon({className:'',html:'<div style="color:#0e1116;font-weight:800;font-size:12px;text-align:center;line-height:1">'+d.rank+'</div>',iconSize:[16,16]});
  L.marker([d.lat,d.lng],{icon:icon,interactive:false}).addTo(markerLayer);
  m.bindPopup(popupHTML(d),{maxWidth:300});
  m.on('click',function(){selectCard(d.rank);});
  markers[d.rank]=m;
});

function setMode(mo){
  mode=mo;
  document.getElementById('tg-sent').className=(mo==='sent')?'on':'';
  document.getElementById('tg-vac').className=(mo==='vac')?'on':'';
  if(mo==='vac'){ map.addLayer(heat); markers && Object.keys(markers).forEach(function(k){markers[k].setStyle({fillOpacity:.45,opacity:.6});}); }
  else{ map.removeLayer(heat); Object.keys(markers).forEach(function(k){markers[k].setStyle({fillOpacity:.78,opacity:.9});}); }
  Object.keys(areas).forEach(function(k){var d=districts.filter(function(x){return x.rank==k;})[0];areas[k].setStyle({color:areaColor(d),fillColor:areaColor(d)});});
  renderLegend();
}
function renderLegend(){
  var L1=document.getElementById('legend');
  if(mode==='sent'){
    L1.innerHTML='<h4>감성 점수 (Sentiment)</h4><div class="grad sent"></div>'
     +'<div class="gl"><span>침체 40</span><span>중립 60</span><span>활황 90</span></div>'
     +'<div class="row" style="margin-top:10px"><span class="sw" style="background:var(--accent);width:9px;height:9px"></span>작은 핀 = 낮은 중요도</div>'
     +'<div class="row"><span class="sw" style="background:var(--accent);width:18px;height:18px"></span>큰 핀 = 높은 중요도</div>'
     +'<div class="note">원의 크기는 상권 단위 영역(중요도 비례 반경), 색은 감성 점수. 점수는 리뷰·블로그·뉴스 정성 평가 종합(0~100).</div>';
  }else{
    L1.innerHTML='<h4>공실률 히트맵 (Vacancy)</h4><div class="grad vac"></div>'
     +'<div class="gl"><span>낮음 3%</span><span>주의 10%</span><span>위험 18%+</span></div>'
     +'<div class="note">색이 붉을수록 공실 위험이 높은 상권. 라페스타(13.6%)·원당(추정 18%)이 최고 위험. SpaceOS 공실 솔루션 우선 대상.</div>';
  }
}

function popupHTML(d){
  var col=sentColor(d.sentiment);
  var kws=d.kw.map(function(k){return '<span>'+k+'<\/span>';}).join('');
  return '<div class="pop"><h3>'+d.name+'<\/h3><div class="gu">'+d.gu+' · 중요도 '+d.rank+'위<\/div>'
   +'<div class="scwrap"><b style="color:'+col+'">'+d.sentiment+'<\/b><span>/ 100 감성 점수<\/span><\/div>'
   +'<div class="bar"><i style="width:'+d.sentiment+'%;background:'+col+'"><\/i><\/div>'
   +'<div class="stats"><div class="stat"><div class="v" style="color:#e74c3c">'+d.vacRate+'%<\/div><div class="l">공실률(추정)<\/div><\/div>'
   +'<div class="stat"><div class="v">'+d.importance+'<\/div><div class="l">중요도 지수<\/div><\/div><\/div>'
   +'<div class="stat" style="margin:6px 0"><div class="v" style="font-size:12px">'+d.stores+' · '+d.flow+'<\/div><div class="l">규모 / 특성<\/div><\/div>'
   +'<div class="kw">'+kws+'<\/div>'+'<div class="pn"><div class="lab p">긍정 감성<\/div><div class="chips p">'+d.pos.map(function(k){return '<span>'+k+'<\/span>';}).join('')+'<\/div>'+'<div class="lab n">부정 감성<\/div><div class="chips n">'+d.neg.map(function(k){return '<span>'+k+'<\/span>';}).join('')+'<\/div><\/div>'+'<div class="desc">'+d.desc+'<\/div><div class="src">출처: '+d.src+'<\/div><\/div>';
}
var list=document.getElementById('list');
document.getElementById('count').textContent=districts.length+'개';
districts.forEach(function(d){
  var col=sentColor(d.sentiment);
  var el=document.createElement('div');
  el.className='card';el.id='card-'+d.rank;
  el.innerHTML='<div class="rank">'+d.rank+'위<\/div><h3>'+d.name+' <span class="gu">'+d.gu+'<\/span><\/h3>'
   +'<div class="meta"><div class="score" style="color:'+col+'">'+d.sentiment+'<small>/100<\/small><\/div>'
   +'<div style="flex:1"><div style="font-size:10.5px;color:var(--sub)">감성 · 중요도 '+d.importance+'<\/div>'
   +'<div class="bar"><i style="width:'+d.sentiment+'%;background:'+col+'"><\/i><\/div><\/div><\/div>'
   +'<div class="kw">'+d.kw.slice(0,4).map(function(k){return '<span>'+k+'<\/span>';}).join('')+'<\/div>'
   +'<div class="vac">공실률(추정): <b>'+d.vacRate+'%<\/b> · '+d.stores+'<\/div>';
  el.onclick=function(){selectCard(d.rank);map.flyTo([d.lat,d.lng],14,{duration:.8});markers[d.rank].openPopup();};
  list.appendChild(el);
});
function selectCard(rank){
  var cards=document.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){cards[i].classList.remove('active');}
  var c=document.getElementById('card-'+rank);
  if(c){c.classList.add('active');c.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
(function(){
  var n=districts.length;
  var avg=Math.round(districts.reduce(function(a,d){return a+d.sentiment;},0)/n);
  var risk=districts.filter(function(d){return d.vacRate>=10;}).length;
  var best=districts.slice().sort(function(a,b){return b.sentiment-a.sentiment;})[0];
  document.getElementById('summary').innerHTML=
    '<div class="s"><div class="v" style="color:var(--accent)">'+n+'<\/div><div class="l">분석 상권<\/div><\/div>'
   +'<div class="s"><div class="v">'+avg+'<\/div><div class="l">평균 감성<\/div><\/div>'
   +'<div class="s"><div class="v" style="color:var(--neg)">'+risk+'<\/div><div class="l">공실위험(≥10%)<\/div><\/div>'
   +'<div class="s"><div class="v" style="color:var(--pos);font-size:12px;padding-top:3px">'+best.name.split(' ')[0]+'<\/div><div class="l">최고 감성<\/div><\/div>';
})();
renderLegend();
</script>
</body>
</html>
